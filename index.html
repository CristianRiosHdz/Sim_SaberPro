<!DOCTYPE html>
<html lang="es" data-theme="light">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description"
    content="Simulador de Pruebas Saber Pro. Prepárate con cuestionarios interactivos por módulo, retroalimentación inmediata y seguimiento de progreso.">
  <title>Simulador Saber Pro — Prepárate para tu examen</title>

  <!-- CSS -->
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/auth.css">
  <link rel="stylesheet" href="css/quiz-images.css">

  <!-- KaTeX (Para fórmulas matemáticas en Quill) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>

  <!-- Quill WYSIWYG Editor (solo se usa en el admin para editar contenido de estudio) -->
  <link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet">

  <!-- Favicon emoji -->
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎓</text></svg>">
</head>

<body>
  <div class="app-layout">

    <!-- ── Header ── -->
    <header class="app-header">
      <div class="header-inner">
        <a href="#home" class="header-brand" aria-label="Ir al inicio">
          <div class="header-logo">SP</div>
          <div>
            <div class="header-title">Saber Pro</div>
            <div class="header-subtitle">Simulador de Pruebas</div>
          </div>
        </a>
        <div class="header-actions">
          <button class="theme-toggle" id="theme-toggle" aria-label="Cambiar tema">🌙</button>
        </div>
      </div>
    </header>

    <!-- ── Main Content (SPA container) ── -->
    <main class="app-main" id="app">
      <!-- El contenido se renderiza dinámicamente -->
      <div class="empty-state" style="padding: var(--spacing-16)">
        <div class="loading-spinner" style="margin: 0 auto"></div>
        <p style="margin-top: var(--spacing-4); color: var(--color-text-muted)">Iniciando simulador...</p>
      </div>
    </main>

    <footer class="app-footer">
      <div class="footer-inner">
        <p><strong>Simulador Saber Pro</strong> &copy; 2026 — Desarrollado por <strong>Cristian Rios</strong></p>
        <p style="margin-top: var(--spacing-1); font-size: var(--font-size-xs)">
          Plataforma educativa de práctica con persistencia en la nube (Supabase).
        </p>
      </div>
    </footer>
  </div>

  <!-- ── Quill WYSIWYG JS ── -->
  <script src="https://cdn.quilljs.com/1.3.7/quill.min.js"></script>
  <!-- ── JavaScript (ES Modules) ── -->
  <script type="module" src="js/app.js"></script>
</body>

</html>
